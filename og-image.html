<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>OG Image — 수납록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Inter:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    color: #fff;
    word-break: keep-all;
    background:
      radial-gradient(900px 500px at 85% -5%, rgba(102,187,106,.32), transparent 60%),
      radial-gradient(700px 380px at 8% 110%, rgba(67,160,71,.22), transparent 60%),
      linear-gradient(180deg, #003909 0%, #003909 55%, #1B5E20 100%);
    position: relative;
  }
  .frame {
    width: 1200px; height: 630px;
    padding: 70px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }
  .top {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .brand-ko {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
  }
  .brand-en {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #66BB6A;
    margin-top: 6px;
    letter-spacing: .06em;
  }
  .eyebrow {
    display: inline-block;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .14em;
    color: #66BB6A;
    background: rgba(102,187,106,.14);
    border: 1px solid rgba(102,187,106,.32);
    padding: 8px 16px;
    border-radius: 999px;
    margin-bottom: 28px;
  }
  .headline {
    font-size: 56px;
    font-weight: 800;
    line-height: 1.25;
    letter-spacing: -.025em;
    margin-bottom: 28px;
  }
  .headline em {
    color: #66BB6A;
    font-style: normal;
    white-space: nowrap;
    background: linear-gradient(180deg, transparent 64%, rgba(102,187,106,.28) 64%);
    padding: 0 6px;
  }
  .sub {
    font-size: 24px;
    color: rgba(255,255,255,.78);
    line-height: 1.55;
    margin-bottom: 32px;
    max-width: 920px;
  }
  .bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
  }
  .badges {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .badge {
    font-size: 18px;
    font-weight: 700;
    padding: 12px 20px;
    border-radius: 12px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.16);
    color: #fff;
  }
  .badge strong {
    color: #66BB6A;
    margin-right: 4px;
  }
  .price {
    text-align: right;
  }
  .price-tag {
    font-family: 'Inter', 'Noto Sans KR', sans-serif;
    font-size: 56px;
    font-weight: 800;
    color: #66BB6A;
    line-height: 1;
    letter-spacing: -.02em;
  }
  .price-tag .won { font-size: 32px; color: rgba(255,255,255,.7); margin-left: 6px; }
  .price-cap {
    font-size: 16px;
    color: rgba(255,255,255,.65);
    margin-top: 8px;
    letter-spacing: .04em;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="top">
    <span style="display:inline-flex;align-items:center;justify-content:center;background:#fff;border-radius:16px;padding:4px;box-shadow:0 1px 2px rgba(0,0,0,.12)">
      <img src="android-icon-192x192.png" alt="" aria-hidden="true" width="64" height="64" style="display:block;border-radius:12px">
    </span>
    <div class="brand-text">
      <div class="brand-ko">수납록</div>
      <div class="brand-en">SUNAPROK · v2.0.0</div>
    </div>
  </div>

  <div>
    <span class="eyebrow">폐기물 처리장 전용 · 클라우드 SaaS</span>
    <h1 class="headline">
      현장에서 입력, 사무실에서 <em>즉시 청구</em> —<br>
      처리장 수납을 <em>한 화면</em>에서.
    </h1>
    <p class="sub">
      설치 없이 가입 즉시 시작. 소장이 입력하면<br>
      사무실 화면에 실시간으로 뜹니다.
    </p>
  </div>

  <div class="bottom">
    <div class="badges">
      <div class="badge"><strong>·</strong> 설치 불필요</div>
      <div class="badge"><strong>·</strong> 현장↔사무실 실시간</div>
      <div class="badge"><strong>·</strong> 14일 무료체험</div>
    </div>
    <div class="price">
      <div class="price-tag">월 49,000<span class="won">원~</span></div>
      <div class="price-cap">카드 없이 14일 무료체험</div>
    </div>
  </div>
</div>
</body>
</html>
